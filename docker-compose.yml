version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cities_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cities_db"]
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 10s

  api:
    build: .
    command: ["/app/entrypoint.sh"]
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: cities_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_POOL_SIZE: 20
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
